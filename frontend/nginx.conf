server {
    listen 80;
    server_name localhost;

    # ── Racine du frontend React ───────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;  # Gestion du routage SPA (React Router)
    }

    # ── Proxy pour l'API Django REST ───────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Proxy pour les WebSockets (IMPORTANT pour le temps réel)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Fichiers médias (ordonnances PDF, photos)
    location /media/ {
        alias /app/media/;
    }

    # Fichiers statiques Django Admin
    location /static/ {
        alias /app/staticfiles/;
    }
}
