version: '3.8'
services:
  # ─── BASE DE DONNÉES ─────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_user -d pharma_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── REDIS (WebSockets) ──────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── TURN SERVER (WebRTC via NAT restrictif) ─────
  turn:
    image: coturn/coturn
    restart: always
    command: >
      -n --log-file=stdout
      --min-port=49152 --max-port=65535
      --realm=${TURN_REALM:-pharma.local}
      --user=${VITE_TURN_USERNAME:-cpharma}:${VITE_TURN_CREDENTIAL:-cpharma_secret}
      --listening-port=3478
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"

  # ─── BACKEND (Django + Daphne) ───────────────────
  backend:
    build: ./backend
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── FRONTEND (React + Nginx) ────────────────────
  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:80/ws}
        - VITE_TURN_URL=${VITE_TURN_URL:-turn:localhost:3478}
        - VITE_TURN_USERNAME=${VITE_TURN_USERNAME:-cpharma}
        - VITE_TURN_CREDENTIAL=${VITE_TURN_CREDENTIAL:-cpharma_secret}
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

volumes:
  postgres_data:
  static_volume:
  media_volume:
