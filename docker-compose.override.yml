# docker-compose.override.yml
version: '3.8'
# Fichier de surcharges pour l'environnement de développement local.
# Les ports et les volumes de montage à chaud (hot reload) ne doivent 
# être activés qu'ici, et surtout pas en production.

services:
  backend:
    # Hot-reload du code source backend
    volumes:
      - ./backend:/app:z
    # On expose le port 8000 uniquement en dev pour requêter l'API en direct si besoin
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,[::1],backend

  frontend:
    # En dev, on n'utilise pas le build Nginx
    # On surcharge la commande pour utiliser le serveur de dev Vite
    build:
      context: ./frontend
      target: build
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 80
    # Le port 80 est déjà mappé dans docker-compose.yml
    environment:
      - CHOKIDAR_USEPOLLING=true
